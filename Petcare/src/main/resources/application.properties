spring.application.name=Petcare
server.port=8080

# ===============================
# DATABASE - MySQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/Petcare?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Pet2345.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGGING (opcional para debug)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ================= JWT =================
jwt.secret=petcare_secret_key_123456789_petcare_petcare_123456
jwt.expiration=86400000